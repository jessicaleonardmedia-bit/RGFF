/* Auto-resize reporter (added for Webflow iframe embedding).
   Reads the live page height and posts it to the parent page so the
   iframe can size itself. Reads document.body fresh each tick, so it
   survives the bundler's load/replace process. Height only, no app state. */
(function(){
  function H(){var b=document.body,e=document.documentElement;
    if(!b)return 0;return Math.max(b.scrollHeight,e?e.scrollHeight:0);}
  var last=0;
  function post(){var v=H();if(v&&v!==last){last=v;
    try{parent.postMessage({rgffPlannerHeight:v},'*');}catch(_){}}}
  window.addEventListener('load',post);
  window.addEventListener('resize',post);
  setInterval(post,500);
})();
</script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

background:var(--blue);box-shadow:8px 8px 0 0 var(--maroon);overflow:hidden;min-height:366px}\n  .hero-wordmark{position:absolute;left:18px;bottom:16px;z-index:2}\n  .hero-id{position:absolute;left:16px;top:15px;z-index:3;\n    display:flex;flex-direction:column;align-items:flex-start;gap:4px}\n  .hero-seal{width:54px;height:auto;display:block;border:2.5px solid var(--maroon);margin-bottom:3px}\n  .hero-id .bx{font-family:var(--body);font-weight:700;font-size:12px;line-height:1.15;color:var(--white)}\n  .hero-id .hash{font-family:var(--display);font-weight:900;font-size:14px;letter-spacing:.02em;color:var(--white);margin-top:2px}\n  .hero-figure{position:absolute;right:-16px;bottom:0;height:106%;width:auto;\n    display:block;z-index:1;pointer-events:none}\n  h1{font-family:var(--display);font-weight:900;line-height:.84;margin:0;\n    font-size:50px;color:var(--white);text-transform:uppercase;letter-spacing:-.015em;\n    text-shadow:3px 3px 0 var(--maroon)}\n  h1 em{font-style:normal;color:var(--pink)}\n\n  /* progress — lit film frames with glow */\n  .progress{margin:24px 0 4px}\n  .progress .plabel{display:flex;justify-content:space-between;align-items:baseline;\n    font-family:var(--body);font-size:11px;text-transform:uppercase;letter-spacing:.08em;\n    color:var(--maroon);margin-bottom:8px}\n  .progress .plabel b{font-family:var(--display);font-size:18px;color:var(--blue)}\n  .frames{display:flex;gap:5px;background:var(--maroon);padding:6px 7px;\n    border:2.5px solid var(--maroon);border-radius:2px;position:relative;overflow:hidden}\n  .frames::before,.frames::after{content:\"\";position:absolute;left:0;right:0;height:6px;\n    background:repeating-linear-gradient(90deg,transparent 0 7px,rgba(255,248,252,.55) 7px 11px,transparent 11px 16px);\n    pointer-events:none}\n  .frames::before{top:0}\n  .frames::after{bottom:0}\n  .frame{flex:1;height:30px;border-radius:1px;background:#3a1414;\n    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);transition:background .22s,box-shadow .22s}\n  .frame.on{background:var(--mint-light);\n    box-shadow:inset 0 0 0 1px rgba(255,255,255,.85),0 0 8px 1px rgba(255,255,255,.4)}\n  .frame.on:nth-child(1){background:#8CFCC6}\n  .frame.on:nth-child(2){background:#60FCA8}\n  .frame.on:nth-child(3){background:#46D68C}\n  .frame.on:nth-child(4){background:#2C9A62}\n  .frame.on:nth-child(5){background:#8CFCC6}\n  .frame.on:nth-child(6){background:#60FCA8}\n  .frame.on:nth-child(7){background:#46D68C}\n  .frame.on:nth-child(8){background:#2C9A62}\n\n  /* tabs */\n  .tabs{display:flex;gap:8px;margin:18px 0}\n  .tabs button{flex:1;font-family:var(--display);font-weight:900;font-size:15px;\n    padding:13px;border-radius:2px;border:2.5px solid var(--maroon);background:var(--blue);\n    color:var(--white);cursor:pointer;text-transform:uppercase;letter-spacing:.02em;\n    box-shadow:3px 3px 0 0 var(--maroon);transition:background .12s}\n  .tabs button:hover{background:var(--blue-tint)}\n  .tabs button.active{background:var(--mint-light);color:var(--maroon)}\n\n  .slot{display:grid;grid-template-columns:48px 1fr;gap:12px;padding:15px 0;\n    border-top:2px dashed rgba(96,36,36,.28)}\n  .slot:first-child{border-top:none}\n  .stime{font-family:var(--display);font-weight:900;font-size:18px;color:var(--maroon);\n    padding-top:14px;letter-spacing:-.01em}\n  .scol{display:flex;flex-direction:column;gap:14px}\n\n  /* ticket-stub session cards */\n  .sess{position:relative;background:var(--card);border:2.5px solid var(--maroon);\n    border-radius:3px;box-shadow:5px 5px 0 0 var(--maroon)}\n  .sess.added{box-shadow:5px 5px 0 0 var(--mint-deep)}\n  .sess.clash{box-shadow:5px 5px 0 0 var(--pink)}\n  .shead{display:flex;align-items:stretch;gap:0;padding:0}\n  /* film-strip spine: coloured edge with paper sprocket holes (echoes the strip motif) */\n  .bar{position:relative;width:18px;flex-shrink:0;align-self:stretch;background:var(--blue);\n    border-right:2.5px solid var(--maroon)}\n  .bar::before{content:\"\";position:absolute;top:7px;bottom:7px;left:50%;transform:translateX(-50%);\n    width:7px;border-radius:3px;\n    background:repeating-linear-gradient(180deg,var(--paper) 0 5px,transparent 5px 11px)}\n  .sess[data-type=\"repeat\"] .bar{background:var(--blue-tint)}\n  .sess[data-type=\"panel\"] .bar{background:var(--mint)}\n  .sess[data-type=\"awards\"] .bar{background:var(--mint-light)}\n  .sess[data-type=\"awards\"] .bar::before{background:repeating-linear-gradient(180deg,var(--maroon) 0 5px,transparent 5px 11px)}\n  .sbody{flex:1;min-width:0;padding:13px 15px}\n  .sess[data-type=\"repeat\"]{background:#EFEBFF}\n  .sess[data-type=\"panel\"]{background:#E2FBEC}\n  .sess[data-type=\"awards\"]{background:var(--maroon)}\n  .sess[data-type=\"awards\"] .stitle{color:var(--white)}\n  .sess[data-type=\"awards\"] .ssub{color:#EAC9C9}\n  .scode{display:inline-block;font-family:var(--display);font-weight:900;font-size:11px;\n    letter-spacing:.05em;text-transform:uppercase;color:var(--white);background:var(--blue);\n    border:2px solid var(--maroon);border-radius:2px;padding:3px 8px;margin-bottom:5px;\n    box-shadow:2px 2px 0 0 var(--maroon)}\n  .sess[data-type=\"repeat\"] .scode{background:var(--blue-tint)}\n  .sess[data-type=\"panel\"] .scode{background:var(--mint);color:var(--maroon)}\n  .sess[data-type=\"awards\"] .scode{background:var(--mint-light);color:var(--maroon)}\n  .stitle{font-family:var(--display);font-weight:900;font-size:21px;line-height:1.0;\n    margin:2px 0 3px;color:var(--ink);text-transform:uppercase}\n  .ssub{font-size:12.5px;color:var(--ink-soft);font-weight:700}\n  .stags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}\n  .tag{font-family:var(--body);font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;\n    text-transform:uppercase;letter-spacing:.04em;border:1.5px solid var(--maroon)}\n  .tag.rep{background:var(--pink-tint);color:var(--maroon)}\n  .tag.single{background:var(--white);color:var(--maroon)}\n  .tag.special{background:var(--pink);color:var(--maroon)}\n  .tag.close{background:var(--maroon);color:var(--white)}\n  .add{flex-shrink:0;align-self:center;margin-right:13px;font-family:var(--display);font-weight:900;\n    font-size:13px;border-radius:2px;border:2.5px solid var(--maroon);background:var(--blue);\n    color:var(--white);padding:11px 13px;cursor:pointer;min-width:78px;min-height:44px;\n    text-transform:uppercase;box-shadow:2px 2px 0 0 var(--maroon);transition:transform .1s,box-shadow .1s}\n  .add:hover{background:var(--mint-light);color:var(--maroon)}\n  .add:active{transform:translate(2px,2px);box-shadow:0 0 0 0 var(--maroon)}\n  .add.on{background:var(--mint);border-color:var(--maroon);color:var(--maroon)}\n  .clashnote{font-family:var(--body);font-size:12.5px;font-weight:700;color:var(--maroon);\n    background:var(--pink-tint);border-top:2px dashed var(--maroon);padding:11px 15px;line-height:1.45}\n  .clashnote a{display:inline-block;margin-top:7px;background:var(--pink);color:var(--maroon);\n    border:2px solid var(--maroon);border-radius:2px;padding:7px 11px;font-family:var(--display);\n    font-weight:900;font-size:11.5px;text-transform:uppercase;letter-spacing:.02em;\n    text-decoration:none;cursor:pointer;box-shadow:2px 2px 0 0 var(--maroon)}\n  .clashnote a:active{transform:translate(2px,2px);box-shadow:0 0 0 0 var(--maroon)}\n\n  .expand{border-top:2px dashed var(--line);border-top-color:#e7d3ca;background:var(--paper)}\n  .exptoggle{width:100%;text-align:left;background:none;border:none;cursor:pointer;\n    font-family:var(--body);font-weight:700;font-size:12.5px;color:var(--maroon);padding:11px 15px;\n    display:flex;justify-content:space-between;align-items:center}\n  .exptoggle:hover{color:var(--blue)}\n  .films{padding:0 15px 13px;display:none}\n  .films.open{display:block}\n  .film{display:flex;justify-content:space-between;gap:10px;font-size:13px;font-weight:700;\n    padding:6px 0;border-top:1px solid #efdcd2}\n  .film:first-child{border-top:none}\n  .film .fmaker{color:var(--ink-soft);font-size:12px;font-style:italic;font-weight:700}\n  .attend{color:var(--mint-deep);font-weight:700;font-style:normal}\n\n  /* my reel */\n  #reel{position:relative}\n  .reelrow{display:grid;grid-template-columns:42px 1fr;gap:12px;padding:13px 0;\n    border-top:1.5px solid var(--line)}\n  .reelrow:first-child{border-top:none}\n  .stime{position:relative}\n  .rcard{position:relative;background:var(--white);border:2.5px solid var(--maroon);border-radius:3px;\n    padding:13px 15px;box-shadow:4px 4px 0 0 var(--maroon)}\n  .rcard.clash{box-shadow:5px 5px 0 0 var(--pink);background:var(--pink-tint)}\n  .rclash{font-family:var(--body);font-size:12px;font-weight:700;color:var(--maroon);margin-top:6px}\n  .rclash a{display:inline-block;margin-top:4px;background:var(--pink);color:var(--maroon);\n    border:2px solid var(--maroon);border-radius:2px;padding:5px 9px;font-family:var(--display);\n    font-weight:900;font-size:11px;text-transform:uppercase;text-decoration:none;cursor:pointer}\n  .gap{font-size:11px;color:var(--maroon);padding:6px 0 6px 54px;font-style:italic;font-weight:700;\n    text-transform:uppercase;letter-spacing:.05em;opacity:.75}\n  .remove{float:right;background:none;border:none;color:var(--ink-soft);cursor:pointer;\n    font-family:var(--body);font-weight:700;font-size:11px;text-transform:uppercase;\n    letter-spacing:.04em;text-decoration:underline}\n  .remove:hover{color:var(--maroon)}\n  .empty{position:relative;text-align:center;padding:34px 24px 38px;color:var(--white);\n    background:var(--blue);border:3px solid var(--maroon);border-radius:3px;margin-top:8px;\n    box-shadow:6px 6px 0 0 var(--maroon)}\n  .empty::before{content:\"\";display:block;width:218px;height:122px;margin:0 auto 18px;\n    background:url(\"a7adf736-0fcb-4d7f-b442-b9f62efe6345\") center/contain no-repeat}\n  .empty .big{font-family:var(--display);font-weight:900;font-size:34px;color:var(--mint-light);\n    text-transform:uppercase;margin-bottom:8px;text-shadow:2px 2px 0 var(--maroon)}\n  .empty>div:last-child{max-width:300px;margin:0 auto;font-size:13px}\n\n  .actions{display:flex;gap:10px;margin-top:24px}\n  .actions button{flex:1;font-family:var(--display);font-weight:900;font-size:14px;\n    padding:14px;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:.02em;\n    border:2.5px solid var(--maroon);box-shadow:4px 4px 0 0 var(--maroon);min-height:48px;\n    transition:transform .1s,box-shadow .1s}\n  .actions button:active{transform:translate(4px,4px);box-shadow:0 0 0 0 var(--maroon)}\n  .surprise{background:var(--mint-light);color:var(--maroon)}\n  .reset{background:var(--blue);color:var(--white)}\n  .reset:hover{background:var(--blue-tint)}\n\n  footer{text-align:center;font-size:11px;color:var(--maroon);margin-top:14px;font-weight:700;\n    text-transform:uppercase;letter-spacing:.05em;opacity:.8}\n  .hidden{display:none!important}\n  @media (max-width:430px){\n    header{min-height:300px}\n    h1{font-size:42px}\n    .hero-figure{height:100%;right:-14px}\n    .wrap{padding:0 12px 52px}\n    .slot,.reelrow{grid-template-columns:42px 1fr;gap:10px}\n    .add{min-width:66px;padding:10px 9px;font-size:12px}\n    .stitle{font-size:19px}\n  }\n<\u002Fstyle>\n\n<\u002Fhead><body><div class=\"strip\" data-comment-anchor=\"a0b5fcb791-div\"><\u002Fdiv>\n<div class=\"wrap\" data-comment-anchor=\"c9591f9a20-div\">\n  <header>\n    <img class=\"hero-figure\" src=\"809792cc-068f-4061-8ef9-b9c70d61ec8e\" alt=\"Giant festival-goer stepping through the city\">\n    <div class=\"hero-wordmark\">\n      <h1>Plan<br>Your<br><em>Reel<\u002Fem><\u002Fh1>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"progress\">\n    <div class=\"plabel\"><span>Your day so far<\u002Fspan><span><b id=\"count\">0<\u002Fb> picked<\u002Fspan><\u002Fdiv>\n    <div class=\"frames\" id=\"frames\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tabs\">\n    <button id=\"tab-day\" class=\"active\" onclick=\"setView('day')\">The day<\u002Fbutton>\n    <button id=\"tab-reel\" onclick=\"setView('reel')\">My reel<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"day\"><\u002Fdiv>\n  <div id=\"reel\" class=\"hidden\"><\u002Fdiv>\n\n  <div class=\"actions\">\n    <button class=\"surprise\" onclick=\"surprise()\">Surprise me<\u002Fbutton>\n    <button class=\"reset\" onclick=\"resetAll()\">Start over<\u002Fbutton>\n  <\u002Fdiv>\n\n  <footer>Saved on your phone, not on us. Tap a session again to drop it.<\u002Ffooter>\n<\u002Fdiv>\n\n<script>\nconst DAY_GATE = false;\n\nconst BLOCKS = {\n  B1:{theme:\"Long Days, Long Nights\",sub:\"Portraits of an ordinary life\",qa:true,films:[\n    {t:\"Mango Seed (芒果芯)\",m:\"Berni Jiang\"},\n    {t:\"A Test\",m:\"Sam Calafiore\",a:true},\n    {t:\"Then The Wind Stops\",m:\"Wentian Jin\",a:true},\n    {t:\"Inner City\",m:\"Jennifer Baulch\",a:true}]},\n  B2:{theme:\"Common Ground\",sub:\"Chaos in close quarters\",qa:true,films:[\n    {t:\"The Eviction\",m:\"Rebecca Metcalf\"},\n    {t:\"Mission: WASH DISHES DON'T DIE\",m:\"Miki Sheoaka Flett\",a:true},\n    {t:\"Rage Bait\",m:\"Hebah Ali\",a:true},\n    {t:\"Sarsaparilla\",m:\"Andrew Kavanagh\"},\n    {t:\"Button Pusher\",m:\"Miski Omar\",a:true}]},\n  B3:{theme:\"Existing On The Fringes\",sub:\"Caught between worlds, identities and expectations\",qa:true,films:[\n    {t:\"Rejoice\",m:\"Lucy de Palma\",a:true},\n    {t:\"Mystic Park\",m:\"John Hewison\"},\n    {t:\"Faceless\",m:\"Fraser Pemberton & William Jaka\",a:true}]},\n  B4:{theme:\"Haunted Memories\",sub:\"Who stays, who goes, who we refuse to forget\",qa:true,films:[\n    {t:\"Piggy\",m:\"Julian Hamman\"},\n    {t:\"Interview With A Hero\",m:\"Andy 'Celeste' Diep\",a:true},\n    {t:\"Goodbye, Fishies\",m:\"Jonathan Zhang\"},\n    {t:\"The Water of the Womb\",m:\"Baris Ulusoy\",a:true},\n    {t:\"Bringing His Spirit Home\",m:\"Dylan Nicholls\"}]},\n  B5:{theme:\"What Remains\",sub:\"What we carry, what we lose, what gets remembered\",qa:true,films:[\n    {t:\"Bőr\",m:\"Dylan Ferenc Nyerges\",a:true},\n    {t:\"Family Man\",m:\"Kalani Gacon\"},\n    {t:\"Of the Last Reel in Front of You\",m:\"Yan Geng\",a:true},\n    {t:\"The Truth about the Telegraph\",m:\"Kieran Mpetyane Satour\"}]},\n  B6:{theme:\"What Do I Want?\",sub:\"Desire, appetite, audacity\",qa:true,films:[\n    {t:\"Set Menu\",m:\"Lindsay McDonald\",a:true},\n    {t:\"Dummy\",m:\"Nikita Gomes\",a:true},\n    {t:\"Baggage\",m:\"Lucy Davidson\",a:true},\n    {t:\"FAMISHED\",m:\"Nathan Sirikumara\",a:true}]},\n  B7:{theme:\"Kalu Oji retrospective\",sub:\"Three films and a conversation with the filmmaker\",qa:true,films:[\n    {t:\"What's In A Name\",m:\"Kalu Oji\",a:true},\n    {t:\"Blackwood\",m:\"Kalu Oji\",a:true},\n    {t:\"The Moon & Me\",m:\"Kalu Oji\",a:true}]},\n  P1:{theme:\"Distribution\",sub:\"Talks panel\",panel:true,films:[]},\n  P2:{theme:\"Cinespace\",sub:\"Talks panel\",panel:true,films:[]},\n  AW:{theme:\"Awards ceremony\",sub:\"Presenter award ceremony to close the festival\",awards:true,films:[]}\n};\n\n// type: screening | repeat | panel | awards.  startMin/endMin in minutes from midnight.\nconst SESSIONS = [\n  {id:\"s1\", block:\"B2\", code:\"B2\", type:\"screening\", cinema:\"Cinema 3\", seats:91,  start:\"10:00\", startMin:600, endMin:670,  len:\"45min + 20 Q&A\"},\n  {id:\"s2\", block:\"B1\", code:\"B1\", type:\"screening\", cinema:\"Cinema 4\", seats:138, start:\"10:30\", startMin:630, endMin:711,  len:\"61min + 20 Q&A\"},\n  {id:\"s3\", block:\"B6\", code:\"B6\", type:\"screening\", cinema:\"Cinema 7\", seats:84,  start:\"10:30\", startMin:630, endMin:695,  len:\"45min + Q&A\"},\n  {id:\"s4\", block:\"P1\", code:\"P1\", type:\"panel\",     cinema:\"Jazz Room\",seats:30,  start:\"11:30\", startMin:690, endMin:750,  len:\"60min panel\"},\n  {id:\"s5\", block:\"B3\", code:\"B3\", type:\"screening\", cinema:\"Cinema 3\", seats:91,  start:\"12:00\", startMin:720, endMin:791,  len:\"51min + 20 Q&A\"},\n  {id:\"s6\", block:\"B4\", code:\"B4\", type:\"screening\", cinema:\"Cinema 4\", seats:138, start:\"12:30\", startMin:750, endMin:832,  len:\"57min + 20 Q&A\", special:true, single:true},\n  {id:\"s7\", block:\"B1\", code:\"B1\", type:\"repeat\",    cinema:\"Cinema 3\", seats:91,  start:\"14:00\", startMin:840, endMin:901,  len:\"61min\"},\n  {id:\"s8\", block:\"B7\", code:\"B7R\",type:\"screening\", cinema:\"Cinema 7\", seats:84,  start:\"14:00\", startMin:840, endMin:905,  len:\"30min + 30 Q&A\", single:true, retro:true},\n  {id:\"s9\", block:\"P2\", code:\"P2\", type:\"panel\",     cinema:\"Jazz Room\",seats:30,  start:\"15:00\", startMin:900, endMin:960,  len:\"60min panel\"},\n  {id:\"s10\",block:\"B5\", code:\"B5\", type:\"screening\", cinema:\"Cinema 3\", seats:91,  start:\"15:30\", startMin:930, endMin:1010, len:\"55min + 20 Q&A\", special:true, single:true},\n  {id:\"s11\",block:\"B6\", code:\"B6\", type:\"repeat\",    cinema:\"Cinema 4\", seats:138, start:\"15:30\", startMin:930, endMin:995,  len:\"45min + 20 Q&A\"},\n  {id:\"s12\",block:\"B2\", code:\"B2\", type:\"repeat\",    cinema:\"Cinema 4\", seats:138, start:\"17:00\", startMin:1020,endMin:1075, len:\"45min\", closing:true},\n  {id:\"s13\",block:\"B3\", code:\"B3\", type:\"repeat\",    cinema:\"Cinema 7\", seats:84,  start:\"17:00\", startMin:1020,endMin:1071, len:\"51min\"},\n  {id:\"s14\",block:\"AW\", code:\"\",   type:\"awards\",    cinema:\"Cinema 4\", seats:138, start:\"18:15\", startMin:1095,endMin:1140, len:\"45min ceremony\"}\n];\n\nconst byId = id => SESSIONS.find(s=>s.id===id);\nconst overlap = (a,b) => a.startMin < b.endMin && b.startMin < a.endMin;\nfunction fmt(min){ const h=Math.floor(min/60), m=min%60; return h+\":\"+String(m).padStart(2,\"0\"); }\n\n/* ---- persistence with in-memory fallback ---- */\nconst KEY = \"rgff_plan_your_reel\";\nlet picks = new Set();\nlet mem = null;\nfunction save(){ try{ localStorage.setItem(KEY, JSON.stringify([...picks])); }catch(e){ mem = [...picks]; } }\nfunction load(){\n  try{ const v = localStorage.getItem(KEY); if(v) picks = new Set(JSON.parse(v)); }\n  catch(e){ if(mem) picks = new Set(mem); }\n}\n\n/* ---- clash helpers ---- */\nfunction clashesFor(sess){\n  return [...picks].map(byId).filter(p=>p.id!==sess.id && overlap(p,sess));\n}\nfunction otherScreenings(blockId, exceptId){\n  return SESSIONS.filter(s=>s.block===blockId && s.id!==exceptId);\n}\nfunction freeSwap(sess){ // a non-clashing other screening of the same block\n  return otherScreenings(sess.block, sess.id).find(o=>clashesFor(o).length===0 && !overlap(o,sess));\n}\n\n/* ---- rendering ---- */\nfunction render(){\n  document.getElementById(\"count\").textContent = picks.size;\n  renderFrames();\n  renderDay();\n  renderReel();\n  save();\n}\n\nfunction renderFrames(){\n  const total = 8;\n  let html=\"\";\n  for(let i=0;i<total;i++){ html += `<div class=\"frame ${i<picks.size?'on':''}\"><\u002Fdiv>`; }\n  document.getElementById(\"frames\").innerHTML = html;\n}\n\nfunction renderDay(){\n  const slots = [...new Set(SESSIONS.map(s=>s.start))];\n  let html=\"\";\n  slots.forEach(time=>{\n    const here = SESSIONS.filter(s=>s.start===time);\n    html += `<div class=\"slot\"><div class=\"stime\">${time}<\u002Fdiv><div class=\"scol\">`;\n    here.forEach(s=> html += sessionCard(s));\n    html += `<\u002Fdiv><\u002Fdiv>`;\n  });\n  document.getElementById(\"day\").innerHTML = html;\n}\n\nfunction sessionCard(s){\n  const b = BLOCKS[s.block];\n  const on = picks.has(s.id);\n  const clashing = !on && clashesFor(s).length>0;\n  const title = s.type===\"awards\" ? b.theme : b.theme;\n  const codeLabel = s.code ? s.code + (s.type===\"repeat\"?\" · repeat\":\"\") : \"\";\n  let tags = \"\";\n  if(s.type===\"repeat\") tags += `<span class=\"tag rep\">↻ repeat<\u002Fspan>`;\n  if(s.closing) tags += `<span class=\"tag close\">Closing night<\u002Fspan>`;\n  if(s.special) tags += `<span class=\"tag special\">Special<\u002Fspan>`;\n  if(s.single) tags += `<span class=\"tag single\">One screening only<\u002Fspan>`;\n\n  let clashHtml=\"\";\n  if(clashing){\n    const c = clashesFor(s)[0];\n    const swap = freeSwap(s);\n    clashHtml = `<div class=\"clashnote\">Clashes with ${c.code||\"Awards\"} at ${c.start}.` +\n      (swap? ` <a onclick=\"toggle('${swap.id}')\">Catch ${swap.code} at ${swap.start} instead<\u002Fa>`:``) + `<\u002Fdiv>`;\n  }\n\n  const expand = (b.films && b.films.length) ? `\n    <div class=\"expand\">\n      <button class=\"exptoggle\" onclick=\"toggleFilms('${s.id}')\">\n        <span>What's in this block (${b.films.length} films${b.qa?', plus Q&A':''})<\u002Fspan><span>+<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"films\" id=\"films-${s.id}\">\n        ${b.films.map(f=>`<div class=\"film\"><span>${f.t}<\u002Fspan>\n          <span class=\"fmaker\">${f.m}${f.a?' <span class=\"attend\">· attending<\u002Fspan>':''}<\u002Fspan><\u002Fdiv>`).join(\"\")}\n      <\u002Fdiv>\n    <\u002Fdiv>` : \"\";\n\n  return `<div class=\"sess ${on?'added':''} ${clashing?'clash':''}\" data-type=\"${s.type}\">\n    <div class=\"shead\">\n      <div class=\"bar\"><\u002Fdiv>\n      <div class=\"sbody\">\n        ${codeLabel?`<div class=\"scode\">${codeLabel}<\u002Fdiv>`:''}\n        <div class=\"stitle\">${title}<\u002Fdiv>\n        <div class=\"ssub\">${s.cinema} · ${s.seats} seats · ${s.len}<\u002Fdiv>\n        ${tags?`<div class=\"stags\">${tags}<\u002Fdiv>`:''}\n      <\u002Fdiv>\n      <button class=\"add ${on?'on':''}\" onclick=\"toggle('${s.id}')\">${on?'Added ✓':'Add'}<\u002Fbutton>\n    <\u002Fdiv>\n    ${clashHtml}\n    ${expand}\n  <\u002Fdiv>`;\n}\n\nfunction renderReel(){\n  const mine = [...picks].map(byId).sort((a,b)=>a.startMin-b.startMin);\n  const el = document.getElementById(\"reel\");\n  if(mine.length===0){\n    el.innerHTML = `<div class=\"empty\"><div class=\"big\">Nothing yet<\u002Fdiv>\n      <div>Head to The day and tap the sessions you want. Your running order builds itself here.<\u002Fdiv><\u002Fdiv>`;\n    return;\n  }\n  let html=\"\";\n  mine.forEach((s,i)=>{\n    const b = BLOCKS[s.block];\n    const clashWith = mine.filter(o=>o.id!==s.id && overlap(o,s));\n    const isClash = clashWith.length>0;\n    // gap before this session\n    if(i>0){\n      const prevEnd = mine[i-1].endMin;\n      const g = s.startMin - prevEnd;\n      if(g>=15) html += `<div class=\"gap\">${g} min break · ${fmt(prevEnd)} to ${s.start}<\u002Fdiv>`;\n    }\n    let note=\"\";\n    if(isClash){\n      const swap = otherScreenings(s.block, s.id).find(o=>!mine.some(m=>overlap(m,o)));\n      note = `<div class=\"rclash\">Overlaps ${clashWith[0].code||'Awards'} (${clashWith[0].start}).` +\n        (swap? ` <a onclick=\"toggle('${s.id}');toggle('${swap.id}')\">Move to ${swap.start}<\u002Fa>`:\n               (s.single?` No other screening, you'll have to choose.`:``)) + `<\u002Fdiv>`;\n    } else if(s.single && s.type!==\"awards\" && s.type!==\"panel\"){\n      note = `<div class=\"rclash\" style=\"color:var(--ink-soft)\">One screening only, no encore.<\u002Fdiv>`;\n    }\n    html += `<div class=\"reelrow\"><div class=\"stime\">${s.start}<\u002Fdiv>\n      <div class=\"rcard ${isClash?'clash':''}\">\n        <button class=\"remove\" onclick=\"toggle('${s.id}')\">remove<\u002Fbutton>\n        ${s.code?`<div class=\"scode\">${s.code}${s.type==='repeat'?' · repeat':''}<\u002Fdiv>`:''}\n        <div class=\"stitle\" style=\"font-size:17px\">${b.theme}<\u002Fdiv>\n        <div class=\"ssub\">${s.cinema} · ${s.len}<\u002Fdiv>\n        ${note}\n      <\u002Fdiv><\u002Fdiv>`;\n  });\n  el.innerHTML = html;\n}\n\n/* ---- interactions ---- */\nfunction toggle(id){ if(picks.has(id)) picks.delete(id); else picks.add(id); render(); }\nfunction toggleFilms(id){ document.getElementById(\"films-\"+id).classList.toggle(\"open\"); }\nfunction setView(v){\n  document.getElementById(\"day\").classList.toggle(\"hidden\", v!==\"day\");\n  document.getElementById(\"reel\").classList.toggle(\"hidden\", v!==\"reel\");\n  document.getElementById(\"tab-day\").classList.toggle(\"active\", v===\"day\");\n  document.getElementById(\"tab-reel\").classList.toggle(\"active\", v===\"reel\");\n}\nfunction surprise(){\n  picks = new Set();\n  [...SESSIONS].sort((a,b)=>a.startMin-b.startMin).forEach(s=>{\n    const clash = [...picks].map(byId).some(p=>overlap(p,s));\n    if(!clash) picks.add(s.id);\n  });\n  render(); setView(\"reel\");\n}\nfunction resetAll(){ picks = new Set(); render(); setView(\"day\"); }\n\n/* ---- boot ---- */\nload(); render();\n<\u002Fscript>\n\n<script>\n/* Presentational only: assigns a fixed brand colour to each block code chip.\n   Reads the rendered .scode text and re-applies on every list re-render.\n   Does NOT read or change app state, logic, ids, classes or onclick. */\n(function(){\n  var P={B1:['#3018F0','#FFFFFF'],B2:['#48CC84','#602424'],B3:['#FCA8E4','#602424'],\n    B4:['#6960F4','#FFFFFF'],B5:['#F2B134','#602424'],B6:['#C43C8F','#FFFFFF'],\n    B7:['#1F8A5B','#FFFFFF'],P1:['#14B8C4','#602424'],P2:['#7A3FE4','#FFFFFF']};\n  function key(t){var m=(t||'').trim().match(/^[A-Z]+\\d+/);if(!m)return null;var k=m[0];\n    return P[k]?k:(k.length>2?k.slice(0,2):k);}\n  function paint(){var e=document.querySelectorAll('.scode');for(var i=0;i<e.length;i++){\n    var c=P[key(e[i].textContent)];if(c){e[i].style.background=c[0];e[i].style.color=c[1];}}}\n  var t;function go(){clearTimeout(t);t=setTimeout(paint,0);}\n  ['day','reel'].forEach(function(id){var n=document.getElementById(id);\n    if(n)new MutationObserver(go).observe(n,{childList:true,subtree:true});});\n  go();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
